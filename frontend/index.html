<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyPalette</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0f;
      --surface: #13131a;
      --border:  rgba(255,255,255,0.07);
      --orange:  #ff6b2b;
      --rose:    #ff3d6e;
      --gold:    #ffb347;
      --text:    #f0ece6;
      --muted:   rgba(240,236,230,0.45);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 500px;
      background: radial-gradient(ellipse, rgba(255,107,43,0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      display: grid;
      grid-template-columns: 420px 1fr;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--orange), var(--rose));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── LEFT PANEL ── */
    .panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 28px;
      position: relative;
      z-index: 5;
      max-height: calc(100vh - 65px);
    }

    .drop-zone {
      border: 1.5px dashed rgba(255,107,43,0.35);
      border-radius: 14px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      margin-bottom: 20px;
    }

    .drop-zone:hover, .drop-zone.dragging {
      border-color: var(--orange);
      background: rgba(255,107,43,0.05);
    }

    .drop-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
    }

    .drop-icon { font-size: 2rem; margin-bottom: 8px; display: block; }

    .drop-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      margin-bottom: 4px;
    }

    .drop-sub { font-size: 0.78rem; color: var(--muted); }

    .preview-wrap {
      display: none;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .preview-wrap img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      display: block;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--orange), var(--rose));
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      display: none;
      margin-bottom: 12px;
    }

    .btn:hover   { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .loading {
      display: none;
      text-align: center;
      padding: 16px 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .spinner {
      width: 26px; height: 26px;
      border: 2px solid rgba(255,107,43,0.2);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .scores-wrap { display: none; animation: fadeUp 0.4s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .score-main {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .score-big {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .scores-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .score-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .score-card-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .score-card-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
    }

    .bar {
      margin-top: 6px;
      height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--orange), var(--rose));
      transition: width 0.8s cubic-bezier(.16,1,.3,1);
    }

    .location-section {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 12px;
    }

    .location-title {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .gps-found {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      color: #4ade80;
    }

    .gps-manual { display: none; }

    .gps-manual p {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .pick-hint {
      font-size: 0.78rem;
      color: var(--orange);
      margin-bottom: 10px;
      display: none;
    }

    .coords-display {
      font-size: 0.82rem;
      color: var(--text);
      background: rgba(255,107,43,0.08);
      border: 1px solid rgba(255,107,43,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 10px;
      display: none;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--orange); }
    input[type="text"]::placeholder { color: var(--muted); }

    .error-msg {
      display: none;
      padding: 12px 14px;
      background: rgba(255,61,110,0.1);
      border: 1px solid rgba(255,61,110,0.25);
      border-radius: 8px;
      color: #ff6b8a;
      font-size: 0.82rem;
      margin-bottom: 12px;
    }

    /* ── MAP ── */
    #map {
      width: 100%;
      height: calc(100vh - 65px);
    }

    .leaflet-tile { filter: brightness(0.65) saturate(0.7); }

    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }

    /* ── CUSTOM MARKER ── */
    .sunset-marker {
      width: 52px; height: 52px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 3px solid #fff;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      cursor: pointer;
    }

    .sunset-marker img {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: rotate(45deg) scale(1.4);
    }

    /* ── POPUP ── */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 14px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
      color: var(--text) !important;
      padding: 0 !important;
    }

    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-close-button { color: var(--muted) !important; top: 8px !important; right: 10px !important; font-size: 18px !important; }

    .popup-inner { overflow: hidden; border-radius: 14px; min-width: 200px; }
    .popup-img   { width: 100%; height: 130px; object-fit: cover; display: block; }
    .popup-body  { padding: 12px 14px; }

    .popup-score {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      background: linear-gradient(135deg, var(--gold), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .popup-label { font-size: 0.85rem; margin: 2px 0 6px; }
    .popup-loc   { font-size: 0.75rem; color: var(--muted); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">SkyPalette</div>
    <div class="tagline">Sunset Intelligence</div>
  </header>

  <!-- ── PANEL ── -->
  <div class="panel">

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" />
      <span class="drop-icon">🌅</span>
      <div class="drop-title">Sube tu atardecer</div>
      <div class="drop-sub">JPG, PNG · arrastra o haz click</div>
    </div>

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="preview" />
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn" id="analyzeBtn" onclick="analyze()">
      Analizar atardecer →
    </button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      Analizando imagen...
    </div>

    <div class="scores-wrap" id="scoresWrap">

      <div class="score-main">
        <div>
          <div style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Score Final</div>
          <div class="score-big" id="scoreBig">—</div>
        </div>
        <div id="scoreLabel" style="font-size:1rem;font-weight:500">—</div>
      </div>

      <div class="scores-grid">
        <div class="score-card">
          <div class="score-card-label">Score IA</div>
          <div class="score-card-value" id="aiScore">—</div>
          <div class="bar"><div class="bar-fill" id="aiBar" style="width:0%"></div></div>
        </div>
        <div class="score-card">
          <div class="score-card-label">Score Color</div>
          <div class="score-card-value" id="colorScore">—</div>
          <div class="bar"><div class="bar-fill" id="colorBar" style="width:0%"></div></div>
        </div>
      </div>

      <!-- Ubicación -->
      <div class="location-section">
        <div class="location-title">📍 Ubicación</div>

        <div class="gps-found" id="gpsFound">
          <span>✅</span>
          <span id="gpsCoords">GPS extraído automáticamente</span>
        </div>

        <div class="gps-manual" id="gpsManual">
          <p>Esta foto no tiene GPS. Haz click en el mapa para indicar dónde fue tomada.</p>
          <button class="btn" id="pickBtn" style="display:block" onclick="startPicking()">
            🗺️ Seleccionar en el mapa
          </button>
          <div class="pick-hint" id="pickHint">👆 Haz click en el mapa...</div>
          <div class="coords-display" id="coordsDisplay">📍 —</div>
          <input type="text" id="locationName" placeholder="Nombre del lugar (ej: Ibiza, España)" />
        </div>
      </div>

      <button class="btn" id="saveBtn" onclick="save()" style="display:none">
        Guardar en el mapa 💾
      </button>

    </div>
  </div>

  <!-- ── MAP ── -->
  <div id="map"></div>

</div>
<script>
  const API = 'http://127.0.0.1:8000';
  let selectedFile = null;
  let analysisData = null;
  let pickedLat    = null;
  let pickedLon    = null;
  let isPicking    = false;
  let tempMarker   = null;

  // ── MAP ──────────────────────────────────────────────────────────────────
  const map = L.map('map').setView([20, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  map.on('click', function(e) {
    if (!isPicking) return;
    pickedLat = parseFloat(e.latlng.lat.toFixed(6));
    pickedLon = parseFloat(e.latlng.lng.toFixed(6));

    if (tempMarker) map.removeLayer(tempMarker);
    tempMarker = L.circleMarker([pickedLat, pickedLon], {
      radius: 10, color: '#ff6b2b', fillColor: '#ff6b2b', fillOpacity: 0.8
    }).addTo(map);

    document.getElementById('coordsDisplay').style.display = 'block';
    document.getElementById('coordsDisplay').textContent   = `📍 ${pickedLat}, ${pickedLon}`;
    document.getElementById('pickHint').style.display      = 'none';
    document.getElementById('saveBtn').style.display       = 'block';
    isPicking = false;
    map.getContainer().style.cursor = '';
  });

  // ── FILE ─────────────────────────────────────────────────────────────────
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragging'); });
  dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('dragging'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragging');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  function handleFile(file) {
    selectedFile = file; analysisData = null;
    pickedLat = null; pickedLon = null;
    if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('previewImg').src        = ev.target.result;
      document.getElementById('previewWrap').style.display  = 'block';
      document.getElementById('analyzeBtn').style.display   = 'block';
      document.getElementById('scoresWrap').style.display   = 'none';
      document.getElementById('errorMsg').style.display     = 'none';
      document.getElementById('saveBtn').style.display      = 'none';
    };
    reader.readAsDataURL(file);
  }

  // ── ANALYZE ──────────────────────────────────────────────────────────────
  async function analyze() {
    if (!selectedFile) return;
    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    document.getElementById('loading').style.display     = 'block';
    document.getElementById('scoresWrap').style.display  = 'none';
    document.getElementById('errorMsg').style.display    = 'none';

    try {
      const form = new FormData();
      form.append('file', selectedFile);
      const res  = await fetch(`${API}/analyze`, { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Error del servidor');
      analysisData = data;
      renderScores(data);
    } catch (err) {
      document.getElementById('errorMsg').textContent    = '❌ ' + err.message;
      document.getElementById('errorMsg').style.display  = 'block';
    } finally {
      btn.disabled = false;
      document.getElementById('loading').style.display = 'none';
    }
  }

  function renderScores(data) {
    document.getElementById('scoreBig').textContent    = data.final_score;
    document.getElementById('scoreLabel').textContent  = data.label;
    document.getElementById('aiScore').textContent     = data.ai_score;
    document.getElementById('colorScore').textContent  = data.color_score;
    setTimeout(() => {
      document.getElementById('aiBar').style.width    = data.ai_score + '%';
      document.getElementById('colorBar').style.width = data.color_score + '%';
    }, 100);

    if (data.has_gps) {
      pickedLat = data.gps.lat;
      pickedLon = data.gps.lon;
      document.getElementById('gpsFound').style.display   = 'flex';
      document.getElementById('gpsCoords').textContent    = `${pickedLat}, ${pickedLon}`;
      document.getElementById('gpsManual').style.display  = 'none';
      document.getElementById('saveBtn').style.display    = 'block';
      map.setView([pickedLat, pickedLon], 8);
      if (tempMarker) map.removeLayer(tempMarker);
      tempMarker = L.circleMarker([pickedLat, pickedLon], {
        radius: 10, color: '#ff6b2b', fillColor: '#ff6b2b', fillOpacity: 0.8
      }).addTo(map);
    } else {
      document.getElementById('gpsFound').style.display  = 'none';
      document.getElementById('gpsManual').style.display = 'block';
      document.getElementById('saveBtn').style.display   = 'none';
    }

    document.getElementById('scoresWrap').style.display = 'block';
  }

  // ── PICK ─────────────────────────────────────────────────────────────────
  function startPicking() {
    isPicking = true;
    map.getContainer().style.cursor = 'crosshair';
    document.getElementById('pickHint').style.display    = 'block';
    document.getElementById('coordsDisplay').style.display = 'none';
  }

  // ── SAVE ─────────────────────────────────────────────────────────────────
  async function save() {
    if (!analysisData || pickedLat === null) return;
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Guardando...';

    try {
      const payload = {
        ...analysisData,
        latitude:      pickedLat,
        longitude:     pickedLon,
        location_name: document.getElementById('locationName')?.value || null,
      };
      const res  = await fetch(`${API}/save`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Error al guardar');

      saveBtn.textContent = '✅ Guardado';
      if (tempMarker) map.removeLayer(tempMarker);
      addMarker({
        latitude:     pickedLat,
        longitude:    pickedLon,
        final_score:  analysisData.final_score,
        label:        analysisData.label,
        image_base64: analysisData.image_base64,
        location_name: payload.location_name,
      });
    } catch (err) {
      document.getElementById('errorMsg').textContent   = '❌ ' + err.message;
      document.getElementById('errorMsg').style.display = 'block';
      saveBtn.disabled = false;
      saveBtn.textContent = 'Guardar en el mapa 💾';
    }
  }

  // ── MARKERS ──────────────────────────────────────────────────────────────
  function addMarker(s) {
    const icon = L.divIcon({
      className:   '',
      html:        `<div class="sunset-marker"><img src="${s.image_base64}" /></div>`,
      iconSize:    [52, 52],
      iconAnchor:  [26, 52],
      popupAnchor: [0, -56],
    });
    L.marker([s.latitude, s.longitude], { icon }).addTo(map)
      .bindPopup(`
        <div class="popup-inner">
          <img class="popup-img" src="${s.image_base64}" />
          <div class="popup-body">
            <div class="popup-score">${s.final_score} / 100</div>
            <div class="popup-label">${s.label}</div>
            ${s.location_name ? `<div class="popup-loc">📍 ${s.location_name}</div>` : ''}
          </div>
        </div>
      `);
  }

  // ── LOAD EXISTING ────────────────────────────────────────────────────────
  async function loadSunsets() {
    try {
      const res  = await fetch(`${API}/sunsets`);
      const list = await res.json();
      list.forEach(addMarker);
    } catch(e) { console.warn('Sin atardeceres guardados aún'); }
  }

  loadSunsets();
</script>
</body>
</html>
