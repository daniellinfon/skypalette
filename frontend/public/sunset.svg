<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Cielo degradado -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="50%"  stop-color="#ff6b2b"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a3a4a"/>
      <stop offset="100%" stop-color="#0a1a2a"/>
    </linearGradient>
  </defs>

  <!-- Fondo cielo -->
  <rect width="32" height="32" rx="6" fill="url(#sky)"/>

  <!-- Mar -->
  <rect x="0" y="20" width="32" height="12" rx="0" fill="url(#sea)"/>
  <rect x="0" y="26" width="32" height="6" rx="0" fill="#0a1a2a"/>

  <!-- Reflejo en el mar -->
  <rect x="14" y="21" width="4" height="7" rx="2" fill="#ffb34755" opacity="0.6"/>

  <!-- Sol -->
  <circle cx="16" cy="20" r="4" fill="#ffb347"/>
  <circle cx="16" cy="20" r="3" fill="#ff6b2b"/>

  <!-- Línea del horizonte -->
  <rect x="0" y="19.5" width="32" height="1" fill="#ff3d6e" opacity="0.6"/>
</svg>
